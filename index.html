<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f4f8;
            font-family: 'Arial', sans-serif;
        }

        #game {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            cursor: pointer;
            transition: 0.2s;
            background: #e2e8f0;
            border-radius: 10px;
        }

        .cell:hover {
            background: #cbd5e1;
        }

        .cell.taken {
            cursor: default;
            background: #94a3b8;
            color: #1e293b;
        }

        #status {
            margin-top: 20px;
            font-size: 20px;
            color: #0f172a;
            text-align: center;
        }

        #resetBtn {
            margin-top: 10px;
            padding: 8px 16px;
            border: none;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        #resetBtn:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

    <div>
        <div id="game"></div>
        <div id="status">Player X's turn</div>
        <button id="resetBtn">Restart Game</button>
    </div>

    <script>
        const game = document.getElementById('game')
        const status = document.getElementById('status')
        const resetBtn = document.getElementById('resetBtn')

        let board = Array(9).fill('')
        let currentPlayer = 'X'
        let gameOver = false

        const winningCombos = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function render() {
            game.innerHTML = '';
            board.forEach((cell, i) => {
                const div = document.createElement('div')
                div.classList.add('cell')

                if (cell) div.classList.add('taken')

                div.textContent = cell
                div.addEventListener('click', () => makeMove(i))
                game.appendChild(div)

            });
        }

        function makeMove(index) {
            if (board[index] || gameOver) return

            board[index] = currentPlayer
            checkWinner();

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X'
            if (!gameOver) status.text
            Content = `Player ${currentPlayer}'s turn`
            render();
        }

        function checkWinner() {
            for (const combo of winningCombos) {
                const [a, b, c] = combo
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    status.textContent = `Player ${board[a]} wins! 🎉`
                    gameOver = true;
                    highlightWinner(combo)
                    return;
                }
            }

            if (!board.includes('')) {

                status.textContent = "It's a tie! 🤝"
                gameOver = true
            }
        }

        function highlightWinner(combo) {
            const cells = document.querySelectorAll('.cell')
            combo.forEach(i => cells[i].style.background = '#facc15')
        }

        resetBtn.addEventListener('click', () => {

            board = Array(9).fill('')
            currentPlayer = 'X'
            gameOver = false


            status.textContent = `Player ${currentPlayer}'s turn`
            render();
        });

        render()
    </script>

</body>

</html>
